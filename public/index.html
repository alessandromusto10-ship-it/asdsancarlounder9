<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  
  <!-- ✅ VIEWPORT OTTIMIZZATO PER iOS, Android e Web -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <title>ASD San Carlo Milano - Under 9</title>
  
  <!-- ✅ iOS PWA META TAGS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="San Carlo U9" />
  
  <!-- ✅ THEME COLOR -->
  <meta name="theme-color" content="#7A1F2E" />
  <meta name="apple-touch-fullscreen" content="yes" />
  
  <!-- ✅ FAVICON E ICONE iOS -->
  <link rel="icon" type="image/svg+xml" href="/icons/logo.svg" />
  <link rel="apple-touch-icon" href="/icons/logo.svg" />
  
  <!-- ✅ MANIFEST PER PWA -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- ✅ PREVIENE ZOOM AUTOMATICO SU iOS -->
  <style>
    * {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    #app {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
