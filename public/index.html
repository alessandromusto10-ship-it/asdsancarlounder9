<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7A1F2E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="San Carlo U9" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/logo.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>ASD San Carlo Milano - Under 9</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header" class="app-header hidden">
      <div class="header-left">
        <img src="/icons/logo.svg" alt="Logo" class="logo" />
        <div class="brand">
          <h1>ASD San Carlo</h1>
          <span class="subtitle">Under 9</span>
        </div>
      </div>
      <div class="header-right">
        <span id="user-name" class="user-name"></span>
        <button id="btn-logout" class="icon-btn" title="Esci">🚪</button>
      </div>
    </header>

    <!-- Main content -->
    <main id="view" class="view"></main>

    <!-- Bottom nav (solo per utenti loggati) -->
    <nav id="bottom-nav" class="bottom-nav hidden"></nav>

    <!-- Install prompt -->
    <div id="install-banner" class="install-banner hidden">
      <span>📲 Installa l'app sul tuo dispositivo</span>
      <button id="btn-install" class="btn btn-primary">Installa</button>
      <button id="btn-install-close" class="icon-btn">✕</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- jsPDF per export PDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.0/dist/jspdf.plugin.autotable.min.js"></script>

  <script type="module" src="/js/supabase.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/router.js"></script>
  <script type="module" src="/js/pages/login.js"></script>
  <script type="module" src="/js/pages/register.js"></script>
  <script type="module" src="/js/pages/reset.js"></script>
  <script type="module" src="/js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
